<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stories — Iron Commerce</title>
    <link rel="stylesheet" href="/admin/css/admin.css" />
  </head>
  <body>
    <div class="admin-shell">
      <aside class="admin-sidebar" id="admin-sidebar"></aside>

      <main class="admin-main">
        <header class="admin-header">
          <span class="admin-badge">Ambiente MVP</span>
          <h1>Stories</h1>
          <p>Gerencie stories por loja.</p>
        </header>

        <div id="alert-container"></div>

        <div class="toolbar">
          <div class="form-group">
            <label for="store-filter">Filtrar por loja</label>
            <select id="store-filter">
              <option value="">Todas as lojas</option>
            </select>
          </div>
          <button class="btn btn-primary" id="btn-new-story">+ Novo story</button>
        </div>

        <section class="panel">
          <div id="stories-table-wrap">
            <div class="empty-state">Carregando stories...</div>
          </div>
        </section>
      </main>
    </div>

    <div class="modal-overlay" id="story-modal">
      <div class="modal">
        <h2 id="modal-title">Novo story</h2>
        <form id="story-form">
          <input type="hidden" id="story-id" />

          <div class="form-row">
            <div class="form-group">
              <label for="story-store-id">Loja</label>
              <select id="story-store-id" required></select>
            </div>
            <div class="form-group">
              <label for="story-sort-order">Ordem</label>
              <input type="number" id="story-sort-order" value="0" min="0" />
            </div>
          </div>

          <div class="form-group">
            <label for="story-title">Título</label>
            <input type="text" id="story-title" required />
          </div>

          <div class="form-group">
            <label for="story-link-url">Link URL</label>
            <input type="text" id="story-link-url" placeholder="https://..." />
          </div>

          <div class="form-group">
            <label>
              <input type="checkbox" id="story-active" checked />
              Ativo
            </label>
          </div>

          <div class="modal-actions">
            <button type="button" class="btn btn-secondary" id="btn-cancel-modal">Cancelar</button>
            <button type="submit" class="btn btn-primary">Salvar</button>
          </div>
        </form>
      </div>
    </div>

    <script src="/admin/js/api.js"></script>
    <script src="/admin/js/layout.js"></script>
    <script src="/admin/js/stories-admin.js"></script>
  </body>
</html>
